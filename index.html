            const totalCoffee = coffees.reduce((sum, c) => sum + c.qty, 0);
            const shiftSales = this.transactions.filter(t => t.shift === s).length;
            return `
                <div style="border:2px solid #e5e7eb;border-radius:0.5rem;padding:1rem;margin-bottom:1rem">
                    <div class="flex-between mb-1">
                        <h3 style="margin:0">Turno ${s}</h3>
                        <span class="chip chip-blue">${members.length} vigili</span>
                    </div>
                    <div class="stats-row" style="margin-bottom:0.5rem">
                        <div class="stat-card"><div class="label">☕ Caffè</div><div class="value" style="color:${totalCoffee<=10?'#ea580c':'#16a34a'};font-size:1.3rem">${totalCoffee}</div></div>
                        <div class="stat-card"><div class="label">📊 Crediti</div><div class="value" style="color:#dc2626;font-size:1.3rem">€${totalDebt.toFixed(2)}</div></div>
                        <div class="stat-card"><div class="label">🛒 Caffè venduti</div><div class="value" style="color:#3b82f6;font-size:1.3rem">${shiftSales}</div></div>
                    </div>
                    ${coffees.length > 0 ? `
                        <div class="text-sm" style="margin-top:0.5rem">
                            <strong>Per prodotto:</strong>
                            ${coffees.map(c => `<span class="chip chip-gray" style="margin:0.15rem">${escapeHtml(c.name)}: ${c.qty}</span>`).join('')}
                        </div>
                    ` : '<p class="text-sm text-gray">Nessun caffè configurato per questo turno</p>'}
                    ${members.length > 0 ? `
                        <details style="margin-top:0.75rem">
                            <summary class="text-sm" style="cursor:pointer;font-weight:600">Vigili turno ${s} (${members.length})</summary>
                            <div style="margin-top:0.5rem">
                                ${members.sort((a,b)=>a.name.localeCompare(b.name)).map(m => `
                                    <div class="text-sm" style="padding:0.25rem 0">
                                        ${escapeHtml(m.name)}${(m.balance||0)>0?` <span style="color:#dc2626">€${m.balance.toFixed(2)}</span>`:''}${m.userId?' 🔗':''}
                                    </div>`).join('')}
                            </div>
                        </details>
                    ` : '<p class="text-sm text-gray">Nessun vigile assegnato</p>'}
                </div>
            `;
        }).join('');
    },

    _turniAssign() {
        const noShift = this.members.filter(m => !m.shift);
        const sorted = [...this.members].sort((a,b) => {
            if (!a.shift && b.shift) return -1;
            if (a.shift && !b.shift) return 1;
            return a.name.localeCompare(b.name);
        });

        // Anche utenti registrati senza member collegato (orphans)
        const orphanUsers = this.users.filter(u =>
            u.role === 'user' && !this.members.some(m => m.userId === u.uid)
        );

        return `
            <div class="alert alert-info">
                <strong>Assegna un turno a ogni vigile.</strong><br>
                I vigili senza turno non possono comprare il caffè (gli altri prodotti sì).
            </div>
            ${noShift.length > 0 ? `<div class="alert alert-warn">⚠️ <strong>${noShift.length}</strong> vigili senza turno</div>` : '<div class="alert alert-ok">✅ Tutti i vigili hanno un turno</div>'}
            <div class="shift-assign-grid">
                ${sorted.map(m => `
                    <div class="shift-assign-row ${!m.shift?'no-shift':''}">
                        <div style="flex:1;min-width:0">
                            <strong>${escapeHtml(m.name)}</strong>
                            ${m.userId?'<span class="chip chip-blue" style="margin-left:0.3rem">🔗 collegato</span>':'<span class="chip chip-gray" style="margin-left:0.3rem">non collegato</span>'}
                            ${(m.balance||0)>0?`<br><span class="text-sm" style="color:#dc2626">Debito: €${m.balance.toFixed(2)}</span>`:''}
                        </div>
                        <div class="shift-buttons">
                            ${SHIFTS.map(s => `<button class="shift-btn ${m.shift===s?'active':''}" onclick="App.assignShift('${m.id}','${s}')">${s}</button>`).join('')}
                            ${m.shift?`<button class="shift-btn" style="color:#dc2626" onclick="App.assignShift('${m.id}',null)" title="Rimuovi turno">×</button>`:''}
                        </div>
                    </div>`).join('')}
            </div>

            ${orphanUsers.length > 0 ? `
                <div class="divider"></div>
                <h3>📱 Account registrati senza vigile collegato (${orphanUsers.length})</h3>
                <p class="text-sm text-gray mb-1">Questi utenti si sono registrati ma non sono ancora associati a un vigile del bar. Vai in 👥 Vigili per collegarli.</p>
                ${orphanUsers.map(u => `
                    <div class="member-item">
                        <div>
                            <strong>${escapeHtml(u.name)}</strong>${u.shift?` <span class="chip chip-shift">T${u.shift}</span>`:''}<br>
                            <span class="text-sm text-gray">${escapeHtml(u.email)}</span>
                        </div>
                    </div>
                `).join('')}
            ` : ''}
        `;
    },

    async assignShift(memberId, shift) {
        const m = this.members.find(x => x.id === memberId);
        if (!m) return;
        m.shift = shift;
        // Se è collegato a un account, allinea anche il turno dell'account
        if (m.userId && shift) {
            try { await db.ref('users/' + m.userId + '/shift').set(shift); } catch(e) {}
        }
        await this.save();
    },

    _turniCoffee() {
        const coffeeProducts = this.products.filter(p => p.isCoffee);
        if (coffeeProducts.length === 0) {
            return `<div class="alert alert-warn">
                <strong>Nessun prodotto è marcato come caffè.</strong><br>
                Vai in 📦 Magazzino, modifica un prodotto e attiva l'opzione "☕ È un caffè".
            </div>`;
        }

        return `
            <div class="alert alert-info">
                <strong>Distribuzione manuale del caffè per turno.</strong><br>
                Per ogni prodotto puoi ridistribuire le scorte tra i turni che lo usano.
                Usa "🔀 Dividi equamente" per ripartire il totale equamente sui turni configurati.
            </div>
            ${coffeeProducts.map(p => {
                const total = SHIFTS.reduce((s,k) => s + (p.shiftStock[k]||0), 0);
                return `
                    <div style="border:2px solid #fbbf24;border-radius:0.5rem;padding:1rem;margin-bottom:1rem;background:#fffbeb">
                        <div class="flex-between mb-1">
                            <div>
                                <h3 style="margin:0">☕ ${escapeHtml(p.name)}</h3>
                                <span class="text-sm text-gray">Turni: <strong>${p.usedByShifts.join('/')}</strong> · Totale: <strong>${total} pz</strong></span>
                            </div>
                            <button class="btn btn-blue btn-sm" onclick="App.splitEqually('${p.id}')">🔀 Dividi equamente</button>
                        </div>
                        <div class="shift-stock-grid" style="grid-template-columns:repeat(4,1fr)">
                            ${SHIFTS.map(s => {
                                const used = p.usedByShifts.includes(s);
                                return `<div class="form-group" style="margin:0;${!used?'opacity:0.4':''}">
                                    <label style="text-align:center">Turno ${s}${!used?' (non usa)':''}</label>
                                    <input type="number" min="0" value="${p.shiftStock[s]||0}" id="tcc-${p.id}-${s}" style="text-align:center" ${!used?'':''}>
                                </div>`;
                            }).join('')}
                        </div>
                        <button class="btn btn-orange btn-full" style="margin-top:0.5rem" onclick="App.saveTurnoCoffee('${p.id}')">💾 Salva distribuzione</button>
                    </div>
                `;
            }).join('')}
        `;
    },

    async splitEqually(prodId) {
        const p = this.products.find(x => x.id === prodId);
        if (!p || !p.isCoffee) return;
        const total = SHIFTS.reduce((s,k) => s + (p.shiftStock[k]||0), 0);
        const split = splitQty(total, p.usedByShifts);
        // turni non usati a 0
        const newDist = {A:0,B:0,C:0,D:0};
        Object.assign(newDist, split);

        if (!confirm(`Dividere ${total} pezzi equamente tra ${p.usedByShifts.join('/')}?\n\n${p.usedByShifts.map(s=>'T'+s+': '+newDist[s]).join(' · ')}`)) return;

        const oldDist = {...p.shiftStock};
        p.shiftStock = newDist;
        const summary = SHIFTS.map(s => `T${s}: ${oldDist[s]||0}→${newDist[s]}`).join(', ');
        this.purchases.unshift({
            id: uid(),
            description: `🔀 Divisione equa ${p.name}: ${summary}`,
            amount: 0, qty: 0,
            productId: p.id, productName: p.name,
            isCoffee: true, isAdjustment: true,
            date: new Date().toISOString(),
            registeredBy: Auth.user.name, registeredByUid: Auth.user.uid
        });
        await this.save();
    },

    async saveTurnoCoffee(prodId) {
        const p = this.products.find(x => x.id === prodId);
        if (!p) return;
        const newDist = {};
        for (const s of SHIFTS) {
            const v = parseInt(document.getElementById(`tcc-${p.id}-${s}`).value);
            if (isNaN(v) || v < 0) { alert(`Valore non valido per turno ${s}`); return; }
            newDist[s] = v;
        }
        const oldDist = {...p.shiftStock};
        let changed = false;
        for (const s of SHIFTS) if (newDist[s] !== (oldDist[s]||0)) changed = true;
        if (!changed) { alert('Nessuna modifica.'); return; }

        p.shiftStock = newDist;
        const summary = SHIFTS.map(s => `T${s}: ${oldDist[s]||0}→${newDist[s]}`).join(', ');
        this.purchases.unshift({
            id: uid(),
            description: `🔧 Distribuzione ${p.name}: ${summary}`,
            amount: 0, qty: 0,
            productId: p.id, productName: p.name,
            isCoffee: true, isAdjustment: true,
            date: new Date().toISOString(),
            registeredBy: Auth.user.name, registeredByUid: Auth.user.uid
        });
        await this.save();
        alert('✅ Distribuzione salvata!');
    },

    // ---- ADMIN (super_admin) ----
    _adminTab: 'ruoli',
    page_admin() {
        if (!Auth.isSuperAdmin()) return '<p>Accesso negato</p>';
        return `
            <div class="flex mb-2">
                <button class="btn ${this._adminTab==='ruoli'?'btn-red':'btn-gray'}" style="flex:1" onclick="App._adminTab='ruoli';App.renderContent()">👑 Ruoli</button>
                <button class="btn ${this._adminTab==='migrazione'?'btn-red':'btn-gray'}" style="flex:1" onclick="App._adminTab='migrazione';App.renderContent()">🔄 Migrazione</button>
            </div>
            ${this._adminTab === 'ruoli' ? this._adminRuoli() : this._adminMigrazione()}`;
    },

    _adminRuoli() {
        const admins = this.users.filter(u => u.role === 'admin');
        const regulars = this.users.filter(u => u.role === 'user');
        const supers = this.users.filter(u => u.role === 'super_admin');

        return `
            <h2>👑 Gestione Ruoli</h2>
            <div class="alert alert-info">Solo tu (Gestore) puoi promuovere o rimuovere amministratori. Massimo 8 admin (2 per turno).</div>

            <h3>👑 Gestore</h3>
            ${supers.map(u => `<div class="member-item"><div><strong>${escapeHtml(u.name)}</strong>${u.shift?` <span class="chip chip-shift">T${u.shift}</span>`:''}<br><span class="text-sm text-gray">${escapeHtml(u.email)}</span></div><span class="chip chip-green">Gestore</span></div>`).join('')}

            <h3 style="margin-top:1rem">🔧 Amministratori (${admins.length}/8)</h3>
            ${admins.length===0?'<p class="text-gray text-sm">Nessun amministratore nominato</p>':
                admins.map(u=>`
                    <div class="member-item">
                        <div><strong>${escapeHtml(u.name)}</strong>${u.shift?` <span class="chip chip-shift">T${u.shift}</span>`:''}<br><span class="text-sm text-gray">${escapeHtml(u.email)}</span></div>
                        <button class="btn btn-orange btn-sm" onclick="App.removeAdmin('${u.uid}')">Rimuovi Admin</button>
                    </div>`).join('')}

            <h3 style="margin-top:1rem">👤 Utenti normali (${regulars.length})</h3>
            ${regulars.length===0?'<p class="text-gray text-sm">Nessun utente registrato</p>':
                regulars.map(u=>`
                    <div class="member-item">
                        <div><strong>${escapeHtml(u.name)}</strong>${u.shift?` <span class="chip chip-shift">T${u.shift}</span>`:''}<br><span class="text-sm text-gray">${escapeHtml(u.email)}</span></div>
                        <button class="btn btn-green btn-sm" ${admins.length>=8?'disabled title="Massimo 8 admin"':''} onclick="App.makeAdmin('${u.uid}')">Nomina Admin</button>
                    </div>`).join('')}`;
    },

    _adminMigrazione() {
        const total = this.members.length;
        const linked = this.members.filter(m => m.userId);
        const unlinked = this.members.filter(m => !m.userId);
        const linkedCount = linked.length;
        const pct = total > 0 ? Math.round((linkedCount / total) * 100) : 0;

        const availableUsers = this.users.filter(u =>
            !this.members.some(m => m.userId === u.uid)
        );

        return `
            <h2>🔄 Migrazione Account</h2>
            <div class="alert alert-info">
                Collega ogni vigile esistente al suo nuovo account con login. Quando un vigile registra un nuovo account e lo colleghi qui, <strong>porta automaticamente con sé tutto il suo storico</strong>: debito attuale, transazioni, pagamenti.
            </div>

            <div style="margin-bottom:1.5rem">
                <div class="flex-between text-sm" style="font-weight:600">
                    <span>Progresso migrazione</span>
                    <span>${linkedCount}/${total} vigili collegati</span>
                </div>
                <div class="mig-progress">
                    <div class="mig-progress-bar" style="width:${pct}%"></div>
                    <div class="mig-progress-text">${pct}%</div>
                </div>
            </div>

            <h3>⚡ Collegamento rapido</h3>
            ${unlinked.length === 0 ? '<div class="alert alert-ok">✅ Tutti i vigili sono collegati!</div>' :
                availableUsers.length === 0 ? '<div class="alert alert-warn">Nessun account disponibile da collegare. I vigili devono prima registrarsi nell\'app.</div>' : `
                <p class="text-sm text-gray mb-1">Suggerimenti automatici basati sul nome (cliccaci per collegare):</p>
                ${unlinked.map(m => {
                    const matches = this._findMatches(m, availableUsers);
                    return `<div class="member-item ${(m.balance||0)>0?'has-debt':''}">
                        <div>
                            <strong>${escapeHtml(m.name)}</strong>${m.shift?` <span class="chip chip-shift">T${m.shift}</span>`:''}
                            ${(m.balance||0)>0?`<br><span class="text-sm" style="color:#dc2626">Debito attuale: €${m.balance.toFixed(2)} (verrà ereditato dall'account)</span>`:''}
                        </div>
                        <div style="text-align:right">
                            ${matches.length > 0 ? matches.slice(0,2).map(u => `
                                <button class="btn btn-blue btn-sm" style="margin:0.1rem" onclick="App.confirmLink('${m.id}','${u.uid}')" title="${escapeAttr(u.email)}">→ ${escapeHtml(u.name.split(' ')[0])}</button>
                            `).join('') : ''}
                            <button class="btn btn-gray btn-sm" onclick="App.modalLink('${m.id}')">📋 Tutti</button>
                        </div>
                    </div>`;
                }).join('')}
            `}

            ${linked.length > 0 ? `
                <div class="divider"></div>
                <details>
                    <summary style="cursor:pointer;font-weight:600;color:#16a34a">✅ Già collegati (${linkedCount})</summary>
                    <div style="margin-top:0.5rem">
                        ${linked.map(m => {
                            const u = this.users.find(u => u.uid === m.userId);
                            return `<div class="mig-link-row linked">
                                <div>
                                    <strong>${escapeHtml(m.name)}</strong>${m.shift?` <span class="chip chip-shift">T${m.shift}</span>`:''}<br>
                                    <span class="text-sm text-gray">${u ? escapeHtml(u.email) : 'Account collegato'}</span>
                                </div>
                                <button class="btn btn-sm btn-gray" onclick="App.unlinkMember('${m.id}')">Scollega</button>
                            </div>`;
                        }).join('')}
                    </div>
                </details>
            ` : ''}
        `;
    },

    // Auto-suggerimento di matching tra vigili (vecchi) e account (nuovi) basato sul nome
    _findMatches(member, users) {
        const memberWords = member.name.toLowerCase().split(/\s+/).filter(w => w.length > 2);
        return users.map(u => {
            const userWords = u.name.toLowerCase().split(/\s+/).filter(w => w.length > 2);
            let score = 0;
            for (const mw of memberWords) {
                for (const uw of userWords) {
                    if (mw === uw) score += 10;
                    else if (mw.includes(uw) || uw.includes(mw)) score += 5;
                }
            }
            // Bonus se i turni coincidono
            if (member.shift && u.shift && member.shift === u.shift) score += 3;
            return { ...u, _score: score };
        }).filter(x => x._score > 0).sort((a,b) => b._score - a._score);
    },

    async confirmLink(memberId, userId) {
        const m = this.members.find(x => x.id === memberId);
        const u = this.users.find(x => x.uid === userId);
        if (!m || !u) return;

        const debtMsg = (m.balance||0) > 0 ? `\n💰 Debito ereditato: €${m.balance.toFixed(2)}` : '';
        const txCount = this.transactions.filter(t => t.memberId === m.id).length;
        const txMsg = txCount > 0 ? `\n📋 ${txCount} transazioni storiche associate` : '';

        if (!confirm(`Collegare:\n\n🧑‍🚒 Vigile: ${m.name}${m.shift?' (T'+m.shift+')':''}\n📱 Account: ${u.name} (${u.email})${u.shift?' [T'+u.shift+']':''}${debtMsg}${txMsg}\n\nL'account ${u.name} riprenderà tutto lo storico di ${m.name}.\n\nConfermi?`)) return;

        m.userId = userId;
        // Allinea il turno: priorità al turno dell'account (se ha scelto in registrazione)
        if (u.shift) {
            m.shift = u.shift;
        } else if (m.shift) {
            // Se il member ha turno ma l'utente no, propaga al profilo utente
            try { await db.ref('users/' + userId + '/shift').set(m.shift); } catch(e) {}
        }

        await this.save();
        alert(`✅ ${u.name} ora ha tutto lo storico di ${m.name}!`);
    },

    async unlinkMember(memberId) {
        const m = this.members.find(x => x.id === memberId);
        if (!m) return;
        if (!confirm(`Scollegare ${m.name} dal suo account?\n\nLo storico (debito, transazioni) resta associato al vigile e potrai ricollegarlo a un altro account in futuro.`)) return;
        m.userId = null;
        await this.save();
    },

    async makeAdmin(userId) {
        const admins = this.users.filter(u => u.role === 'admin');
        if (admins.length >= 8) { alert('Massimo 8 admin (2 per turno).'); return; }
        if (!confirm('Confermi nomina ad amministratore?')) return;
        try {
            await db.ref('users/'+userId+'/role').set('admin');
            alert('✅ Nominato amministratore!');
        } catch(e) { alert('Errore: ' + e.message); }
    },

    async removeAdmin(userId) {
        if (!confirm('Rimuovere i privilegi di amministratore?')) return;
        try {
            await db.ref('users/'+userId+'/role').set('user');
            alert('✅ Privilegi rimossi');
        } catch(e) { alert('Errore: ' + e.message); }
    }
};

// =============================================
// BOOT
// =============================================
fbAuth.onAuthStateChanged(user => {
    if (user) {
        Auth.loadProfile(user);
    } else {
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('app-screen').classList.add('hidden');
    }
});
</script>
</body>
</html>
